<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5437;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f5f5f5;stop-opacity:0.95" />
    </linearGradient>
    <radialGradient id="gloss" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background circle for depth -->
  <circle cx="150" cy="150" r="150" fill="#0a0e27" opacity="0.1"/>
  
  <!-- Neck -->
  <ellipse cx="150" cy="200" rx="45" ry="50" fill="url(#skinGradient)"/>
  
  <!-- Head -->
  <circle cx="150" cy="110" r="65" fill="url(#skinGradient)"/>
  
  <!-- Hair -->
  <path d="M 85 110 Q 85 45 150 40 Q 215 45 215 110" fill="#2a2a2a"/>
  <circle cx="150" cy="50" r="60" fill="#1a1a1a" opacity="0.6"/>
  
  <!-- Ears -->
  <ellipse cx="85" cy="110" rx="15" ry="25" fill="url(#skinGradient)"/>
  <ellipse cx="215" cy="110" rx="15" ry="25" fill="url(#skinGradient)"/>
  
  <!-- Left Eye -->
  <ellipse cx="125" cy="105" rx="12" ry="16" fill="#2a2a2a"/>
  <circle cx="127" cy="107" r="7" fill="#ffffff"/>
  <circle cx="128" cy="106" r="4" fill="#1a1a1a"/>
  <circle cx="129" cy="105" r="1.5" fill="#ffffff" opacity="0.8"/>
  
  <!-- Right Eye -->
  <ellipse cx="175" cy="105" rx="12" ry="16" fill="#2a2a2a"/>
  <circle cx="173" cy="107" r="7" fill="#ffffff"/>
  <circle cx="172" cy="106" r="4" fill="#1a1a1a"/>
  <circle cx="171" cy="105" r="1.5" fill="#ffffff" opacity="0.8"/>
  
  <!-- Left Eyebrow -->
  <path d="M 115 85 Q 125 80 135 82" stroke="#3a3a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Right Eyebrow -->
  <path d="M 165 82 Q 175 80 185 85" stroke="#3a3a3a" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 150 100 L 150 130 M 145 130 L 155 130" stroke="#5a4a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Smile/Mouth - Happy expression -->
  <path d="M 130 145 Q 150 160 170 145" stroke="#8B4513" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 132 145 Q 150 156 168 145" fill="#E8B5A0" opacity="0.7"/>
  
  <!-- Facial shadows for depth -->
  <ellipse cx="100" cy="120" rx="20" ry="30" fill="#5a4a3a" opacity="0.15"/>
  <ellipse cx="200" cy="120" rx="20" ry="30" fill="#5a4a3a" opacity="0.15"/>
  
  <!-- Shirt -->
  <path d="M 90 175 L 85 220 Q 150 230 215 220 L 210 175 Z" fill="url(#shirtGradient)" stroke="#f0f0f0" stroke-width="1"/>
  
  <!-- Shirt collar -->
  <path d="M 135 175 L 130 190 M 165 175 L 170 190" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <circle cx="150" cy="175" r="4" fill="#e0e0e0"/>
  
  <!-- Shirt buttons -->
  <circle cx="150" cy="195" r="2" fill="#cccccc"/>
  <circle cx="150" cy="210" r="2" fill="#cccccc"/>
  
  <!-- Glossy overlay for realism -->
  <ellipse cx="130" cy="95" rx="40" ry="45" fill="url(#gloss)"/>
  
  <!-- Tech accent - subtle blockchain symbol in background -->
  <g opacity="0.08">
    <circle cx="60" cy="80" r="15" fill="none" stroke="#00d9ff" stroke-width="1"/>
    <circle cx="60" cy="80" r="10" fill="none" stroke="#b344ff" stroke-width="1"/>
    <circle cx="240" cy="200" r="12" fill="none" stroke="#ff344f" stroke-width="1"/>
  </g>
</svg>
