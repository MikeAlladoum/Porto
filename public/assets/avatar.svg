<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#b344ff;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="headGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#b344ff;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="150" cy="150" r="150" fill="url(#bgGradient)"/>
  
  <!-- Head -->
  <circle cx="150" cy="100" r="50" fill="url(#headGradient)"/>
  
  <!-- Body -->
  <rect x="100" y="160" width="100" height="100" rx="10" fill="url(#headGradient)" opacity="0.8"/>
  
  <!-- Left Arm -->
  <rect x="50" y="170" width="50" height="30" rx="15" fill="url(#headGradient)" opacity="0.7" transform="rotate(-30 75 185)"/>
  
  <!-- Right Arm -->
  <rect x="200" y="170" width="50" height="30" rx="15" fill="url(#headGradient)" opacity="0.7" transform="rotate(30 225 185)"/>
  
  <!-- Eyes -->
  <circle cx="135" cy="90" r="4" fill="#0a0e27"/>
  <circle cx="165" cy="90" r="4" fill="#0a0e27"/>
  
  <!-- Smile -->
  <path d="M 140 105 Q 150 115 160 105" stroke="#0a0e27" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Tech Elements - Code Symbol -->
  <g opacity="0.6">
    <text x="150" y="280" font-family="monospace" font-size="30" fill="#00d9ff" text-anchor="middle">&lt;/&gt;</text>
  </g>
  
  <!-- Decorative Hexagons -->
  <g stroke="#b344ff" stroke-width="1" fill="none" opacity="0.4">
    <polygon points="20,80 30,75 40,80 35,90 25,90"/>
    <polygon points="260,200 270,195 280,200 275,210 265,210"/>
  </g>
</svg>
