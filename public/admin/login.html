<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mike Alladoum Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============ CSS VARIABLES ============ */
        :root {
            --primary-cyan: #00d9ff;
            --primary-purple: #b344ff;
            --primary-pink: #ff344f;
            --dark-bg: #0a0e27;
            --dark-secondary: #1a1f3a;
            --text-primary: #e0e0ff;
            --text-secondary: #b0b0d0;
            --border-color: rgba(0, 217, 255, 0.2);
            --shadow-glow: 0 0 30px rgba(0, 217, 255, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============ RESET & BASE ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* ============ ANIMATED BACKGROUND ============ */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(179, 68, 255, 0.1) 0%, transparent 50%);
            animation: gradientShift 15s ease infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes gradientShift {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(50px, 50px);
            }
        }

        /* ============ LOGIN CONTAINER ============ */
        .login-wrapper {
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        .login-container {
            background: rgba(26, 31, 58, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* ============ FORM ELEMENTS ============ */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            background: rgba(0, 217, 255, 0.1);
            border-color: var(--primary-cyan);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-cyan);
        }

        .checkbox-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            flex: 1;
        }

        .forgot-password {
            text-align: right;
        }

        .forgot-password a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
            opacity: 0.5;
        }

        .forgot-password a:hover {
            color: var(--primary-cyan);
            opacity: 1;
        }

        /* ============ BUTTONS ============ */
        .btn-login {
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-cyan), #0099cc);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            margin-bottom: 1rem;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-back {
            width: 100%;
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-back:hover {
            border-color: var(--primary-cyan);
            color: var(--primary-cyan);
            background: rgba(0, 217, 255, 0.05);
        }

        /* ============ ERROR MESSAGE ============ */
        .error-message {
            background: rgba(255, 52, 79, 0.1);
            border: 1px solid var(--primary-pink);
            color: var(--primary-pink);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .login-logo {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-rocket"></i> Admin
                </div>
                <h1 class="login-title">Dashboard</h1>
                <p class="login-subtitle">Connexion Admin</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="admin@portfolio.dev"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    />
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="remember" class="checkbox-input" />
                    <label for="remember" class="checkbox-label">Se souvenir de moi</label>
                    <div class="forgot-password">
                        <a href="#" onclick="showMessage('Coming Soon'); return false;">Mot de passe oublié?</a>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Connexion
                </button>
            </form>

            <a href="/" class="btn-back">
                <i class="fas fa-arrow-left"></i> Retour au Portfolio
            </a>
        </div>
    </div>

    <script>
        // ============ LOGIN FORM ============
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');
        const errorMessage = document.getElementById('errorMessage');

        // Demo credentials - In production, use JWT + backend
        const DEMO_EMAIL = 'admin@portfolio.dev';
        const DEMO_PASSWORD = 'admin123';

        // Load saved email if "Remember me" was checked
        window.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('adminEmail');
            if (savedEmail) {
                emailInput.value = savedEmail;
                rememberCheckbox.checked = true;
            }
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Clear previous error
            errorMessage.classList.remove('show');
            errorMessage.textContent = '';

            // Validate
            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }

            // Simple auth check (demo)
            if (email === DEMO_EMAIL && password === DEMO_PASSWORD) {
                // Save credentials if checked
                if (rememberCheckbox.checked) {
                    localStorage.setItem('adminEmail', email);
                } else {
                    localStorage.removeItem('adminEmail');
                }

                // Save admin session
                localStorage.setItem('adminSession', JSON.stringify({
                    email: email,
                    loginTime: new Date().toISOString(),
                    token: 'demo-jwt-token-' + Date.now()
                }));

                // Redirect to dashboard
                window.location.href = '/admin/dashboard.html';
            } else {
                showError('Email ou mot de passe incorrect');
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function showMessage(message) {
            alert(message);
        }

        // Add some keyboard interactions
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (document.activeElement === emailInput || document.activeElement === passwordInput)) {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
